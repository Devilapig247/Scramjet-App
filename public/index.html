<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UBG Proxy</title>
  <style>
    :root {
      --accent: #00ff00;
      --bgGlow: rgba(0,255,0,0.3);
      --dark-bg: #0a0a0a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

    body {
      background: var(--dark-bg);
      color: white;
      font-family: 'Consolas', 'Monospace', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Matrix canvas */
    #matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -1;
      opacity: 0.4;
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: all 0.1s ease-out;
      z-index: 9999;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      padding: 20px;
    }

    .logo {
      font-size: 3em;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 20px var(--bgGlow);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .subtitle {
      color: #aaa;
      font-size: 0.9em;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: -20px;
    }

    /* URL Bar */
    .search-wrapper {
      width: 100%;
      display: flex;
      border: 2px solid var(--accent);
      border-radius: 8px;
      box-shadow: 0 0 20px var(--bgGlow);
      overflow: hidden;
      background: rgba(0,0,0,0.8);
    }

    .search-wrapper:focus-within {
      box-shadow: 0 0 35px var(--bgGlow);
    }

    #urlInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--accent);
      font-family: 'Consolas', monospace;
      font-size: 16px;
      padding: 15px 20px;
      caret-color: var(--accent);
    }

    #urlInput::placeholder {
      color: rgba(0,255,0,0.3);
    }

    #goBtn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0 25px;
      font-family: 'Consolas', monospace;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
      transition: opacity 0.2s;
    }

    #goBtn:hover { opacity: 0.8; }

    /* Quick links */
    .quick-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .quick-link {
      background: rgba(0,255,0,0.05);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Consolas', monospace;
    }

    .quick-link:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 10px var(--bgGlow);
    }

    .hint {
      color: rgba(0,255,0,0.35);
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* Loading overlay */
    #loadingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    #loadingOverlay.active {
      display: flex;
    }

    .spinner {
      width: 50px; height: 50px;
      border: 3px solid rgba(0,255,0,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: var(--accent);
      font-size: 1.2em;
      letter-spacing: 3px;
    }

    .footer {
      position: fixed;
      bottom: 15px;
      color: rgba(0,255,0,0.3);
      font-size: 11px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div id="cursor"></div>
<canvas id="matrix"></canvas>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">CONNECTING...</div>
</div>

<div class="container">
  <div class="logo">🌐 UBG PROXY</div>
  <div class="subtitle">Powered by Scramjet — Browse Freely</div>

  <div class="search-wrapper">
    <input type="text" id="urlInput" placeholder="Type a URL or search... e.g. poki.com" autofocus>
    <button id="goBtn" onclick="navigate()">GO ▶</button>
  </div>

  <div class="quick-links">
    <div class="quick-link" onclick="go('https://poki.com')">Poki</div>
    <div class="quick-link" onclick="go('https://twitch.tv')">Twitch</div>
    <div class="quick-link" onclick="go('https://youtube.com')">YouTube</div>
    <div class="quick-link" onclick="go('https://google.com')">Google</div>
    <div class="quick-link" onclick="go('https://discord.com')">Discord</div>
    <div class="quick-link" onclick="go('https://reddit.com')">Reddit</div>
  </div>

  <div class="hint">ENTER URL • PRESS GO OR ENTER • BROWSE FREELY</div>
</div>

<div class="footer">UBG VILLAGE PRO — PROXY MODE</div>

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  // Matrix rain
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
  const cols = canvas.width / 14;
  const drops = Array(Math.floor(cols)).fill(0);
  setInterval(() => {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#00ff00';
    ctx.font = '14px monospace';
    drops.forEach((y, i) => {
      ctx.fillText(Math.random() > 0.5 ? '1' : '0', i * 14, y * 14);
      if (y * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }, 45);

  // Enter key support
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') navigate();
  });

  function go(url) {
    document.getElementById('urlInput').value = url;
    navigate();
  }

  function navigate() {
    let raw = document.getElementById('urlInput').value.trim();
    if (!raw) return;

    // Add https if missing
    if (!raw.startsWith('http://') && !raw.startsWith('https://')) {
      // If no dot, treat as search
      if (!raw.includes('.')) {
        raw = 'https://www.google.com/search?q=' + encodeURIComponent(raw);
      } else {
        raw = 'https://' + raw;
      }
    }

    document.getElementById('loadingOverlay').classList.add('active');

    // Use Scramjet service worker to proxy
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(() => {
        location.href = '/scram/' + raw;
      }).catch(() => {
        // Fallback if SW not ready
        location.href = '/scram/' + raw;
      });
    } else {
      location.href = '/scram/' + raw;
    }
  }
</script>

</body>
</html>
